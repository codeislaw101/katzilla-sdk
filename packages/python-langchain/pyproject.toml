[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "katzilla-langchain"
version = "0.1.0"
description = "LangChain tools for Katzilla — government-data backbone for AI agents."
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [{ name = "Katzilla", email = "hello@katzilla.dev" }]
keywords = ["katzilla", "langchain", "tools", "government-data", "public-data", "ai-agents"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Libraries",
]

dependencies = [
  "langchain-core>=0.3",
  "requests>=2.28",
  "pydantic>=2.0",
]

[project.urls]
Homepage = "https://katzilla.dev"
Repository = "https://github.com/codeislaw101/katzilla-sdk"
Documentation = "https://katzilla.dev/docs"
Issues = "https://github.com/codeislaw101/katzilla-sdk/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/katzilla_langchain"]
