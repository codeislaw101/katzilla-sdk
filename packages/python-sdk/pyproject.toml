[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "katzilla"
version = "0.1.0"
description = "Official Python SDK for the Katzilla Data API — free OSINT & public data."
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [{ name = "Katzilla", email = "hello@katzilla.dev" }]
keywords = ["katzilla", "api", "data", "osint", "government", "sdk"]

dependencies = [
  "httpx>=0.27.0",
]

[project.optional-dependencies]
openai = ["openai>=1.0.0"]
langchain = ["langchain-core>=0.2.0", "pydantic>=2.0.0"]
crewai = ["crewai>=0.50.0"]
anthropic = ["anthropic>=0.40.0"]
all = ["openai>=1.0.0", "langchain-core>=0.2.0", "pydantic>=2.0.0", "crewai>=0.50.0", "anthropic>=0.40.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/katzilla"]
